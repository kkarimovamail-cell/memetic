services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/generated:/app/backend/generated
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./backend/generated:/app/backend/generated
    command: python bot.py
    depends_on:
      - web